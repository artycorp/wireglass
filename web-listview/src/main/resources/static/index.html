<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>jmeter-web-listview — traffic inspector</title>
    <link rel="stylesheet" href="vendor/fonts/fonts.css"/>
    <link rel="stylesheet" href="vendor/codemirror/codemirror.min.css"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<header class="topbar">
    <div class="brand">jmeter <span>web-listview</span></div>
    <button type="button" id="run-toggle" class="run-toggle" aria-expanded="false" aria-controls="run-panel">
        <span class="plus">+</span> New run <span class="caret">▾</span>
    </button>
    <div id="run-status" class="run-status">idle</div>
</header>

<section id="run-panel" class="run-panel">
    <form id="run-form" class="run-form">
        <label class="field f-grow">url
            <input id="f-url" name="url" type="text" placeholder="https://httpbin.org/get"
                   value="https://httpbin.org/get" required/>
        </label>
        <label class="field">method
            <select id="f-method" name="method">
                <option>GET</option>
                <option>POST</option>
                <option>PUT</option>
                <option>PATCH</option>
                <option>DELETE</option>
                <option>HEAD</option>
            </select>
        </label>
        <label class="field">threads
            <input id="f-threads" name="threads" type="number" min="1" max="100" value="2"/>
        </label>
        <label class="field">iterations
            <input id="f-iterations" name="iterations" type="number" min="1" max="1000" value="3"/>
        </label>
        <label class="field" id="f-contentType-field">content-type
            <input id="f-contentType" name="contentType" type="text" placeholder="application/json"/>
        </label>
        <div class="field f-grow" id="f-body-field" hidden>
            <span class="field-head">body
                <button type="button" id="f-body-format" class="mini" title="Pretty-print JSON">Format</button>
                <span id="f-body-err" class="body-err" role="status"></span>
            </span>
            <textarea id="f-body" name="body" placeholder='{"k":"v"}' rows="2"></textarea>
        </div>
        <div class="run-actions">
            <button type="submit" class="primary">Run</button>
            <button type="button" id="demo-btn">Demo</button>
            <button type="button" id="stop-btn" class="danger" disabled>Stop</button>
            <button type="button" id="clear-btn" title="Clear captured packets">Clear</button>
        </div>
    </form>
</section>

<section class="bodygrid" id="bodygrid">
    <div class="pane listpane">
        <div class="pane-toolbar">
            <div class="facets">
                <div class="facet-group" role="group" aria-label="Type">
                    <span class="facet-label">type</span>
                    <button type="button" class="seg active" data-type="">all</button>
                    <button type="button" class="seg http" data-type="HTTP">HTTP</button>
                    <button type="button" class="seg ws" data-type="WEBSOCKET">WS</button>
                    <button type="button" class="seg tcp" data-type="TCP">TCP</button>
                </div>
                <div class="facet-group" role="group" aria-label="Status">
                    <span class="facet-label">status</span>
                    <button type="button" class="chip s2" data-status="2" aria-pressed="false">2xx</button>
                    <button type="button" class="chip s3" data-status="3" aria-pressed="false">3xx</button>
                    <button type="button" class="chip s4" data-status="4" aria-pressed="false">4xx</button>
                    <button type="button" class="chip s5" data-status="5" aria-pressed="false">5xx</button>
                    <button type="button" class="chip failed" id="chip-failed" aria-pressed="false">⚠ failed</button>
                </div>
                <label class="facet-inline">method
                    <select id="filter-method">
                        <option value="">any</option>
                        <option>GET</option>
                        <option>POST</option>
                        <option>PUT</option>
                        <option>PATCH</option>
                        <option>DELETE</option>
                        <option>HEAD</option>
                        <option>WS</option>
                    </select>
                </label>
                <label class="facet-inline">latency ≥
                    <input id="filter-latency" type="number" min="0" step="50" placeholder="0"/> ms
                </label>
                <div class="search-wrap">
                    <input id="filter-text" type="text" placeholder="search url / label..."/>
                    <label class="chk" title="also search request/response bodies">
                        <input id="filter-bodies" type="checkbox"/> bodies
                    </label>
                </div>
                <span id="packet-count" class="count">0 packets</span>
                <button type="button" id="schema-toggle" class="schema-toggle" aria-expanded="false" aria-controls="schema-panel">Schemas</button>
            </div>
            <div class="active-filters" id="active-filters" hidden>
                <span class="af-label">active:</span>
                <span id="active-tags"></span>
                <button type="button" id="reset-filters" class="reset">Reset</button>
            </div>
            <div class="schema-panel" id="schema-panel" hidden>
                <label class="schema-field pattern">URL pattern
                    <input id="schema-pattern" type="text" placeholder="/api/users/{id}"/>
                </label>
                <label class="schema-field target">target
                    <select id="schema-target">
                        <option value="response">response</option>
                        <option value="request">request</option>
                    </select>
                </label>
                <label class="schema-field schema">JSON Schema
                    <textarea id="schema-json" rows="4" placeholder='{"type":"object","required":["id"]}'></textarea>
                </label>
                <div class="schema-actions">
                    <button type="button" id="schema-save" class="primary">Save</button>
                    <span id="schema-message" class="schema-message" role="status"></span>
                </div>
                <div id="schema-list" class="schema-list"></div>
            </div>
        </div>
        <div class="table-wrap">
            <table id="packet-table">
                <thead>
                <tr>
                    <th class="c-idx">#</th>
                    <th class="c-time sortable" data-sort="time" aria-sort="none">time</th>
                    <th class="c-type sortable" data-sort="type" aria-sort="none">type</th>
                    <th class="c-method sortable" data-sort="method" aria-sort="none">method</th>
                    <th class="c-url sortable" data-sort="url" aria-sort="none">url / label</th>
                    <th class="c-status sortable" data-sort="status" aria-sort="none">status</th>
                    <th class="c-latency sortable" data-sort="latency" aria-sort="none">latency</th>
                    <th class="c-size sortable" data-sort="size" aria-sort="none">resp kB</th>
                </tr>
                </thead>
                <tbody id="packet-body"></tbody>
            </table>
        </div>
    </div>

    <aside class="pane detailpane" id="detail-pane" aria-label="Packet detail">
        <button type="button" id="detail-close" class="detail-close" title="Close (Esc)" aria-label="Close detail">×</button>
        <div id="detail-content">
            <div class="empty">Select a packet to inspect request &amp; response bodies.</div>
        </div>
    </aside>
    <button type="button" id="detail-restore" class="detail-restore" title="Show inspector" aria-label="Show inspector" hidden>
        <span aria-hidden="true">‹</span>
    </button>
</section>

<template id="row-template">
    <tr class="pkt">
        <td class="c-idx"></td>
        <td class="c-time"></td>
        <td class="c-type"></td>
        <td class="c-method"></td>
        <td class="c-url"></td>
        <td class="c-status"></td>
        <td class="c-latency"></td>
        <td class="c-size"></td>
    </tr>
</template>

<div id="body-modal" class="body-modal" hidden>
    <div class="bm-dialog" role="dialog" aria-modal="true" aria-label="Body viewer">
        <div class="bm-head">
            <span id="bm-title" class="bm-title"></span>
            <span id="bm-size" class="body-size"></span>
            <span id="bm-toggle" class="body-toggle" role="group" aria-label="View mode"></span>
            <div id="bm-search-wrap" class="bm-search-wrap">
                <input id="bm-search" type="text" placeholder="find in body…" aria-label="Find in body"/>
                <label class="chk" title="Treat the query as a regular expression"><input id="bm-regex" type="checkbox"/> regex</label>
                <span id="bm-count" class="bm-count"></span>
                <button type="button" id="bm-prev" class="mini" title="Previous match (Shift+Enter)" aria-label="Previous match">↑</button>
                <button type="button" id="bm-next" class="mini" title="Next match (Enter)" aria-label="Next match">↓</button>
            </div>
            <button type="button" id="bm-close" class="mini" title="Close (Esc)" aria-label="Close">✕</button>
        </div>
        <div id="bm-host" class="bm-host"></div>
    </div>
</div>

<script src="vendor/codemirror/codemirror.min.js"></script>
<script src="vendor/codemirror/addon/search/searchcursor.min.js"></script>
<script src="vendor/codemirror/mode/javascript/javascript.min.js"></script>
<script src="vendor/codemirror/mode/xml/xml.min.js"></script>
<script src="app.js"></script>
</body>
</html>
