name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The project targets Java 17 (the DSL is built against JMeter 5.6.x).
      # cache: maven persists ~/.m2 between runs.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Playwright unpacks Chromium under ~/.cache/ms-playwright; cache it so only
      # the first run (or a version bump) pays the download. Key is pinned to the
      # playwright.version in web-listview/pom.xml.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-1.48.0

      # Build + install the modules (compiling test sources so the Playwright CLI
      # is on the classpath), then install Chromium WITH its system libraries.
      # The project's own pre-integration-test install is browser-only; on a Linux
      # runner headless Chromium also needs OS packages, hence --with-deps here.
      - name: Compile and install Chromium (+ OS deps)
        run: |
          mvn -B -q -DskipTests -DskipITs=true -DskipPlaywrightInstall=true install
          mvn -B -q -pl web-listview -Dexec.classpathScope=test \
            org.codehaus.mojo:exec-maven-plugin:3.4.1:exec \
            -Dexec.executable=java \
            -Dexec.args="-classpath %classpath com.microsoft.playwright.CLI install --with-deps chromium"

      # Full verify: unit tests + Playwright e2e (*IT). Chromium is already present
      # from the step above, so skip the project's own install to avoid re-running it.
      - name: Build and test (unit + Playwright e2e)
        run: mvn -B verify -DskipPlaywrightInstall=true
